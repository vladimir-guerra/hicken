services:
  # Nginx Proxy Manager
  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy-manager
    restart: always
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - ./npm/data:/data
      - ./npm/letsencrypt:/etc/letsencrypt
    networks:
      - pihole_net # Conectamos a la misma red para que NPM pueda hablar con Pi-hole

  # Pi-hole
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    restart: always
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "67:67/udp"
      - "8080:80"
    environment:
      TZ: 'America/Argentina/Buenos_Aires'
      WEBPASSWORD: 'hicken'
      DNSMASQ_LISTENING: 'all'
      ServerIP: '192.168.1.10'
    volumes:
      - './pihole/etc-pihole:/etc/pihole'
      - './pihole/etc-dnsmasq.d:/etc/dnsmasq.d'
    cap_add:
      - NET_ADMIN
    networks:
      pihole_net:
        ipv4_address: 192.168.1.10

networks:
  pihole_net:
    driver: macvlan
    driver_opts:
      parent: eth0 # <--- RECUERDA: Cámbialo por tu interfaz real (ej. enp3s0)
    ipam:
      config:
        - subnet: 192.168.1.0/24
          gateway: 192.168.1.1
          ip_range: 192.168.1.10/32
